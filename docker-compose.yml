services:
  punto-venta:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: punto-venta-rewards
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pdv.rule=Host(`pdv.bitelbot.com`)"
      - "traefik.http.routers.pdv.entrypoints=websecure"
      - "traefik.http.routers.pdv.tls=true"
      - "traefik.http.routers.pdv.tls.certresolver=letsencrypt"
      - "traefik.http.services.pdv.loadbalancer.server.port=3000"
